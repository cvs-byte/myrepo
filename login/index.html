<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shop Auth</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --panel: #ffffff;
      --text: #172033;
      --muted: #62708a;
      --primary: #1f6feb;
      --primary-dark: #1656b8;
      --border: #d9e1ee;
      --success: #1f8a4c;
      --error: #b42318;
      --shadow: 0 20px 60px rgba(23, 32, 51, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background: radial-gradient(circle at top, #ffffff 0%, #edf2fb 45%, var(--bg) 100%);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .auth-shell {
      width: min(960px, 100%);
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 24px;
      align-items: stretch;
    }

    .hero,
    .panel {
      background: var(--panel);
      border: 1px solid rgba(217, 225, 238, 0.9);
      border-radius: 24px;
      box-shadow: var(--shadow);
    }

    .hero {
      padding: 40px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      background:
        linear-gradient(135deg, rgba(31, 111, 235, 0.09), rgba(31, 138, 76, 0.06)),
        var(--panel);
    }

    .hero h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 4vw, 3.5rem);
      line-height: 1.05;
      letter-spacing: -0.03em;
    }

    .hero p {
      margin: 0;
      max-width: 36rem;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.7;
    }

    .hero .notes {
      margin-top: 32px;
      display: grid;
      gap: 12px;
    }

    .note {
      padding: 14px 16px;
      border-radius: 16px;
      background: #f8fbff;
      border: 1px solid var(--border);
      color: var(--muted);
    }

    .panel {
      padding: 24px;
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-bottom: 22px;
    }

    .tab-btn {
      border: 1px solid var(--border);
      background: #f8fbff;
      color: var(--muted);
      padding: 14px 16px;
      border-radius: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .tab-btn.active {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }

    form {
      display: grid;
      gap: 14px;
    }

    .field label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.95rem;
      font-weight: 700;
    }

    .field input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 16px;
      font: inherit;
      outline: none;
      background: #fff;
    }

    .field input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(31, 111, 235, 0.12);
    }

    .action {
      border: none;
      border-radius: 14px;
      padding: 14px 16px;
      background: var(--primary);
      color: #fff;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .action:hover {
      background: var(--primary-dark);
    }

    .ghost-action {
      border: none;
      background: transparent;
      color: var(--primary);
      padding: 0;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      justify-self: start;
    }

    .ghost-action:hover {
      color: var(--primary-dark);
      text-decoration: underline;
    }

    .message {
      min-height: 1.4em;
      font-size: 0.95rem;
      font-weight: 700;
    }

    .message.success {
      color: var(--success);
    }

    .message.error {
      color: var(--error);
    }

    .hidden {
      display: none;
    }

    @media (max-width: 860px) {
      .auth-shell {
        grid-template-columns: 1fr;
      }

      .hero {
        padding: 28px;
      }
    }
  </style>
</head>
<body>
  <main class="auth-shell">
    <section class="hero">
      <div>
        <h1>Welcome back to Shop.</h1>
        <p>Sign in to continue shopping, or create a new account in a few seconds.</p>
      </div>
      <div class="notes">
        <div class="note">Simple login and signup UI connected through a small fetch wrapper.</div>
        <div class="note">Update the API base URL in <strong>auth.js</strong> if your backend runs on another host.</div>
      </div>
    </section>

    <section class="panel">
      <div class="tabs" role="tablist" aria-label="Authentication mode">
        <button class="tab-btn active" id="loginTab" type="button">Login</button>
        <button class="tab-btn" id="signupTab" type="button">Sign Up</button>
      </div>

      <form id="loginForm">
        <div class="field">
          <label for="loginEmail">Email</label>
          <input id="loginEmail" name="email" type="email" autocomplete="email" required />
        </div>

        <div class="field">
          <label for="loginPassword">Password</label>
          <input id="loginPassword" name="password" type="password" autocomplete="current-password" required />
        </div>

        <button class="action" type="submit">Login</button>
        <button class="ghost-action" id="forgotPasswordButton" type="button">Forgot password?</button>
        <div id="loginMessage" class="message" aria-live="polite"></div>
      </form>

      <form id="signupForm" class="hidden">
        <div class="field">
          <label for="signupName">Full Name</label>
          <input id="signupName" name="name" type="text" autocomplete="name" required />
        </div>

        <div class="field">
          <label for="signupEmail">Email</label>
          <input id="signupEmail" name="email" type="email" autocomplete="email" required />
        </div>

        <div class="field">
          <label for="signupPassword">Password</label>
          <input id="signupPassword" name="password" type="password" autocomplete="new-password" minlength="6" required />
        </div>

        <button class="action" type="submit">Create Account</button>
        <div id="signupMessage" class="message" aria-live="polite"></div>
      </form>

      <form id="forgotPasswordForm" class="hidden">
        <div class="field">
          <label for="forgotEmail">Email</label>
          <input id="forgotEmail" name="email" type="email" autocomplete="email" required />
        </div>

        <button class="action" type="submit">Send Reset Link</button>
        <button class="ghost-action" id="backToLoginButton" type="button">Back to login</button>
        <div id="forgotMessage" class="message" aria-live="polite"></div>
      </form>
    </section>
  </main>

  <script src="auth.js"></script>
</body>
</html>
